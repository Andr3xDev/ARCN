name: TTD Lab CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'tdd-lab/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'tdd-lab/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./tdd-lab

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean compile

    - name: Run tests
      run: mvn test

    - name: Generate test report
      if: always()
      run: mvn surefire-report:report

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: tdd-lab/target/surefire-reports/

    - name: Test Summary
      if: always()
      run: |
        echo "### Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f target/surefire-reports/TEST-escuelaing.arcn.tdd.FizzBuzzTest.xml ]; then
          echo "FizzBuzz Tests:" >> $GITHUB_STEP_SUMMARY
          grep -oP 'tests="\K[^"]*' target/surefire-reports/TEST-escuelaing.arcn.tdd.FizzBuzzTest.xml | head -1 | xargs -I {} echo "- Total: {}" >> $GITHUB_STEP_SUMMARY
          grep -oP 'failures="\K[^"]*' target/surefire-reports/TEST-escuelaing.arcn.tdd.FizzBuzzTest.xml | head -1 | xargs -I {} echo "- Failures: {}" >> $GITHUB_STEP_SUMMARY
          grep -oP 'errors="\K[^"]*' target/surefire-reports/TEST-escuelaing.arcn.tdd.FizzBuzzTest.xml | head -1 | xargs -I {} echo "- Errors: {}" >> $GITHUB_STEP_SUMMARY
        fi
