# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud configuration for MediSync Frontend
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=JAPV-X2612_medi-sync-frontend
sonar.organization=japv-x2612
sonar.projectName=medi-sync-frontend
sonar.projectVersion=1.0

# ─── Source code ──────────────────────────────────────────────────────────────
sonar.sources=src

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  src/test/**,\
  src/data/**

# ─── Test files ───────────────────────────────────────────────────────────────
sonar.test.inclusions=src/**/*.test.{js,jsx},src/**/*.spec.{js,jsx}

# ─── Coverage (lcov report generated by Vitest --coverage) ───────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
