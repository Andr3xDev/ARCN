name: CI/CD — MediSync Frontend

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build & Test
  # Compiles the Vite production bundle and runs Vitest with lcov coverage.
  # The coverage report is uploaded as an artifact for the SonarCloud stage.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build — Vite production bundle
        run: npm run build

      - name: Test — Vitest with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2 — Static Analysis with SonarCloud
  # Runs after build-and-test passes. Downloads the lcov report and submits
  # the full source tree to SonarCloud for quality gate evaluation.
  # ─────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for blame annotations)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploy to Vercel
  # Runs only on pushes to main after SonarCloud passes.
  # Uses Vercel CLI: pull project config → build → deploy prebuilt output.
  # Required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — Vercel
    needs: sonarcloud
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project configuration
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production artifacts
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
